openapi: 3.0.3
info:
  title: DCM CRM Backend API
  version: 1.1.0
servers:
  - url: http://localhost:4000
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
paths:
  /api/auth/register:
    post:
      summary: Registro (rate-limited)
      requestBody:
        required: true
        content:
          application/json:
            example:
              first_name: Admin
              last_name: DCM
              email: admin2@dcm.local
              password: ChangeMe123!
              role: admin
      responses:
        '201': { description: Created }
        '429': { description: Too many requests }
  /api/auth/login:
    post:
      summary: Login (rate-limited)
      requestBody:
        required: true
        content:
          application/json:
            example: { email: admin@dcm.local, password: ChangeMe123! }
      responses:
        '200':
          description: OK
          content:
            application/json:
              example: { access_token: "<jwt>", token_type: bearer }
        '429': { description: Too many requests }
  /api/orders:
    get:
      security: [{ bearerAuth: [] }]
      summary: Listado de órdenes con filtros e índices
      parameters:
        - in: query
          name: page
          schema: { type: integer, default: 1 }
        - in: query
          name: pageSize
          schema: { type: integer, default: 20, maximum: 100 }
        - in: query
          name: status
          schema: { type: string }
        - in: query
          name: technician
          schema: { type: string }
        - in: query
          name: client
          schema: { type: string }
        - in: query
          name: priority
          schema: { type: string }
        - in: query
          name: from
          schema: { type: string, format: date }
        - in: query
          name: to
          schema: { type: string, format: date }
      responses:
        '200':
          description: OK
          content:
            application/json:
              example: { items: [], total: 0, page: 1, pageSize: 20 }
    post:
      security: [{ bearerAuth: [] }]
      summary: Crear orden (admin)
      requestBody:
        required: true
        content:
          application/json:
            example:
              client_id: clx1
              estado: presupuesto_generado
              prioridad: alta
              fecha_programada: '2026-03-10'
              technicians: [tec1, tec2]
      responses:
        '201': { description: Created }
  /api/orders/{id}:
    patch:
      security: [{ bearerAuth: [] }]
      summary: Actualizar orden (flujo estricto por rol)
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            examples:
              valid_tech:
                value: { estado: en_ejecucion }
              invalid_tech:
                value: { fecha_programada: '2026-04-01' }
      responses:
        '200': { description: Updated }
        '400': { description: Invalid transition/field }
        '403': { description: Not assigned }
    delete:
      security: [{ bearerAuth: [] }]
      summary: Soft delete orden (admin)
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        '200': { description: Soft deleted }
  /api/orders/{id}/technicians:
    put:
      security: [{ bearerAuth: [] }]
      summary: Reasignar técnicos + auditoría (admin)
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            example: { technicians: [tec1, tec2, tec3] }
      responses:
        '200': { description: Updated }
  /api/orders/{id}/history:
    get:
      security: [{ bearerAuth: [] }]
      summary: Historial de auditoría por campo
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        '200':
          description: OK
          content:
            application/json:
              example:
                - campo_modificado: prioridad
                  valor_anterior: media
                  valor_nuevo: alta
                  comentario: Cambio de prioridad
  /api/clients/{id}:
    delete:
      security: [{ bearerAuth: [] }]
      summary: Soft delete cliente (bloqueado con órdenes activas)
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        '200': { description: Soft deleted }
        '400': { description: Client has active orders }
