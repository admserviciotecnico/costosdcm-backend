version: '3.9'
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: dcm_crm
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    working_dir: /app
    volumes:
      - ./backend:/app
    command: sh -c "npm install && npm run prisma:generate && npm run prisma:migrate && npm run seed && npm run dev"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/dcm_crm
      PORT: 4000
      JWT_SECRET: change_this_secret
      JWT_EXPIRES_IN: 1d
      CORS_ORIGIN: http://localhost:3000
    depends_on:
      - postgres
    ports:
      - "4000:4000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    working_dir: /app
    volumes:
      - ./frontend:/app
    command: sh -c "npm install && npm run dev"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000
    depends_on:
      - backend
    ports:
      - "3000:3000"

volumes:
  pgdata:
